<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng OpenTelemetry (Metrics, Logs, Traces) - V2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #333; }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        #btn-logs { background-color: #3b82f6; }
        #btn-metrics { background-color: #10b981; }
        #btn-traces { background-color: #8b5cf6; }
        #btn-reset { background-color: #6b7280; }

        .architecture {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative; /* Quan trọng để vẽ SVG lên trên */
        }
        
        /* Lớp lưới vô hình để vẽ đường dây */
        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Không cản trở click chuột */
            z-index: 10;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 22%;
            z-index: 20; /* Nổi lên trên đường dây */
        }
        .col-title {
            text-align: center;
            font-weight: bold;
            color: #4b5563;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .node {
            background-color: #f9fafb;
            border: 2px solid #d1d5db;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            color: #4b5563;
            transition: all 0.3s ease;
            position: relative;
            background: white;
        }
        
        /* Hiệu ứng phát sáng của các Node */
        .active-logs { background-color: #eff6ff; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); color: #1e3a8a;}
        .active-metrics { background-color: #f0fdf4; border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); color: #064e3b;}
        .active-traces { background-color: #f5f3ff; border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); color: #4c1d95;}

        /* Hiệu ứng dòng chảy dữ liệu trên đường dây */
        .data-flow-line {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 12, 12;
            animation: flowAnimation 0.8s linear infinite;
        }
        @keyframes flowAnimation {
            to { stroke-dashoffset: -24; }
        }

        .message-box {
            margin-top: 20px;
            width: 100%;
            max-width: 1100px;
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            min-height: 80px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h2>Mô phỏng Luồng Dữ liệu Observability- LongNgo</h2>
    
    <div class="controls">
        <button id="btn-logs" onclick="playFlow('logs')">1. Luồng LOGS (Báo lỗi)</button>
        <button id="btn-metrics" onclick="playFlow('metrics')">2. Luồng METRICS (Quá tải RAM)</button>
        <button id="btn-traces" onclick="playFlow('traces')">3. Luồng TRACES (Chậm Code)</button>
        <button id="btn-reset" onclick="resetFlow()">Khôi phục</button>
    </div>

    <div class="architecture" id="arch">
        <svg id="svg-overlay"></svg>
        
        <div class="column">
            <div class="col-title">1. Nguồn Phát (App)</div>
            <div class="node" id="node-app">App Server (Tomcat)<br><small>+ OTel Agent</small></div>
            <div class="node" id="node-backend">Backend<br><small>(RabbitMQ)</small></div>
        </div>

        <div class="column">
            <div class="col-title">2. Thu Thập & Phân Loại</div>
            <div class="node" id="node-otel">OTel Collector</div>
            <div class="node" id="node-promtail">Promtail (Agent)</div>
        </div>

        <div class="column">
            <div class="col-title">3. Kho Lưu Trữ</div>
            <div class="node" id="node-tempo">Tempo (Traces)</div>
            <div class="node" id="node-prom">Prometheus (Metrics)</div>
            <div class="node" id="node-loki">Loki (Logs)</div>
        </div>

        <div class="column">
            <div class="col-title">4. Hiển Thị</div>
            <div class="node" id="node-grafana">Grafana Dashboard</div>
        </div>
    </div>

    <div class="message-box" id="msg-box">
        > Đang chờ lệnh mô phỏng...
    </div>

    <script>
        const nodes = ['node-app', 'node-backend', 'node-otel', 'node-promtail', 'node-tempo', 'node-prom', 'node-loki', 'node-grafana'];
        let timeoutIds = [];

        function resetFlow() {
            // Xóa timeouts
            timeoutIds.forEach(clearTimeout);
            timeoutIds = [];
            
            // Xóa màu các node
            nodes.forEach(id => {
                document.getElementById(id).className = 'node';
            });

            // Xóa tất cả các đường dây trên SVG
            const svg = document.getElementById('svg-overlay');
            while (svg.firstChild) {
                svg.removeChild(svg.firstChild);
            }

            document.getElementById('msg-box').innerHTML = "> Đang chờ lệnh mô phỏng...";
        }

        function highlightNode(id, type, delay) {
            const timer = setTimeout(() => {
                document.getElementById(id).classList.add(`active-${type}`);
            }, delay);
            timeoutIds.push(timer);
        }

        // Hàm tính toán tọa độ và vẽ đường cong Bezier nối 2 Node
        function drawLine(startId, endId, color, delay) {
            const timer = setTimeout(() => {
                const startEl = document.getElementById(startId);
                const endEl = document.getElementById(endId);
                const archEl = document.getElementById('arch');
                const svg = document.getElementById('svg-overlay');

                // Lấy tọa độ tương đối so với thẻ cha (architecture box)
                const startRect = startEl.getBoundingClientRect();
                const endRect = endEl.getBoundingClientRect();
                const archRect = archEl.getBoundingClientRect();

                const startX = startRect.right - archRect.left;
                const startY = startRect.top + (startRect.height / 2) - archRect.top;
                
                const endX = endRect.left - archRect.left;
                const endY = endRect.top + (endRect.height / 2) - archRect.top;

                // Tạo đường cong mềm mại (Cubic Bezier Curve)
                const curveOffset = 50; 
                const d = `M ${startX} ${startY} C ${startX + curveOffset} ${startY}, ${endX - curveOffset} ${endY}, ${endX} ${endY}`;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', d);
                path.setAttribute('class', 'data-flow-line');
                path.setAttribute('stroke', color);
                
                svg.appendChild(path);
            }, delay);
            timeoutIds.push(timer);
        }

        function playFlow(type) {
            resetFlow();
            const msgBox = document.getElementById('msg-box');

            if (type === 'logs') {
                const color = '#3b82f6';
                msgBox.innerHTML = "> [LOGS] Promtail đang đọc file nhật ký từ Tomcat và RabbitMQ... <br>> [LOGS] Đang PUSH thẳng vào kho Loki... <br>> [LOGS] Grafana truy xuất Loki để hiện báo lỗi màu đỏ.";
                
                // Bật sáng Node
                highlightNode('node-app', 'logs', 0);
                highlightNode('node-backend', 'logs', 0);
                highlightNode('node-promtail', 'logs', 800);
                highlightNode('node-loki', 'logs', 1600);
                highlightNode('node-grafana', 'logs', 2400);

                // Vẽ đường dây
                drawLine('node-app', 'node-promtail', color, 0);
                drawLine('node-backend', 'node-promtail', color, 0);
                drawLine('node-promtail', 'node-loki', color, 800);
                drawLine('node-loki', 'node-grafana', color, 1600);
            } 
            else if (type === 'metrics') {
                const color = '#10b981';
                msgBox.innerHTML = "> [METRICS] OTel Agent đo RAM/CPU của App Server... <br>> [METRICS] Đẩy về Trạm phân loại OTel Collector... <br>> [METRICS] Collector định tuyến số liệu sang Prometheus... <br>> [METRICS] Grafana truy vấn Prometheus để vẽ biểu đồ.";
                
                highlightNode('node-app', 'metrics', 0);
                highlightNode('node-otel', 'metrics', 800);
                highlightNode('node-prom', 'metrics', 1600);
                highlightNode('node-grafana', 'metrics', 2400);

                drawLine('node-app', 'node-otel', color, 0);
                drawLine('node-otel', 'node-prom', color, 800);
                drawLine('node-prom', 'node-grafana', color, 1600);
            }
            else if (type === 'traces') {
                const color = '#8b5cf6';
                msgBox.innerHTML = "> [TRACES] OTel Agent ghi lại dấu vết (Span) thời gian chạy code... <br>> [TRACES] Gửi về OTel Collector... <br>> [TRACES] Collector đẩy sang kho Tempo... <br>> [TRACES] Grafana chỉ ra hàm code nào gây chậm hệ thống.";
                
                highlightNode('node-app', 'traces', 0);
                highlightNode('node-otel', 'traces', 800);
                highlightNode('node-tempo', 'traces', 1600);
                highlightNode('node-grafana', 'traces', 2400);

                drawLine('node-app', 'node-otel', color, 0);
                drawLine('node-otel', 'node-tempo', color, 800);
                drawLine('node-tempo', 'node-grafana', color, 1600);
            }
        }
    </script>
</body>
</html>
